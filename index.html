<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoGuard Tracker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; }
        #map { width: 100%; height: 100%; background: #1e293b; }
        .leaflet-container { font-family: ui-sans-serif, system-ui, sans-serif; }
    </style>
</head>
<body class="text-slate-200">

    <!-- Emergency Warning Banner -->
    <div id="emergency-banner" class="hidden fixed top-0 left-0 right-0 bg-red-600 text-white z-[10000] shadow-xl px-6 py-4 animate-pulse flex items-center justify-between border-b border-red-700">
        <div class="flex items-center gap-3">
            <span class="flex h-3 w-3 relative">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-white"></span>
            </span>
            <p class="text-xs font-bold tracking-wider uppercase">EMERGENCY ALERT: <span id="emergency-msg" class="font-mono ml-1"></span></p>
        </div>
        <button id="dismiss-emergency" class="hidden bg-black/20 hover:bg-black/40 text-white font-sans text-xs uppercase px-4 py-1.5 rounded-lg transition-all border border-white/20">
            Turn Off Alarm
        </button>
    </div>

    <!-- Screen 1: Login / Group Setup Panel -->
    <div id="setup-panel" class="absolute inset-0 z-[9999] flex items-center justify-center bg-slate-950 p-4">
        <div class="w-full max-w-sm bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl flex flex-col gap-5">
            <div class="text-center">
                <h1 class="text-xl font-bold text-white uppercase tracking-wide">GeoGuard Tracker</h1>
                <p class="text-slate-400 text-xs mt-1">Share live locations and stay safe together</p>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold tracking-wider uppercase text-slate-400">Your Name</label>
                <input type="text" id="username" placeholder="Enter your name" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-all text-white font-medium" />
            </div>

            <div class="grid grid-cols-2 gap-3 mt-2">
                <button id="btn-create-mode" class="bg-slate-800 hover:bg-slate-700 text-white font-bold text-xs uppercase py-3 px-4 rounded-xl border border-slate-700 transition-all">Create a Group</button>
                <button id="btn-join-mode" class="bg-slate-800 hover:bg-slate-700 text-white font-bold text-xs uppercase py-3 px-4 rounded-xl border border-slate-700 transition-all">Join a Group</button>
            </div>

            <!-- Create Group Input Box -->
            <div id="create-group-box" class="hidden space-y-3 pt-2 border-t border-slate-800/60">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold tracking-wider uppercase text-slate-400">Group Name</label>
                    <input type="text" id="group-name" placeholder="e.g., Friends & Family" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-all text-white" />
                </div>
                <button id="btn-submit-create" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase py-3 rounded-xl tracking-wider transition-all">Create and Start</button>
            </div>

            <!-- Join Group Input Box -->
            <div id="join-group-box" class="hidden space-y-3 pt-2 border-t border-slate-800/60">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold tracking-wider uppercase text-slate-400">Group Invite Code</label>
                    <input type="text" id="target-group-id" placeholder="Paste invite code here" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm font-mono focus:outline-none focus:border-blue-500 transition-all text-white" />
                </div>
                <button id="btn-submit-join" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs uppercase py-3 rounded-xl tracking-wider transition-all">Join Group</button>
            </div>
        </div>
    </div>

    <!-- Screen 2: Main Dashboard Tracking View -->
    <div id="tracking-panel" class="hidden absolute inset-0 flex">
        
        <!-- Left Sidebar Panel -->
        <div class="w-80 bg-slate-950 border-r border-slate-900 flex flex-col justify-between z-[500] shrink-0 shadow-2xl">
            
            <div class="p-4 space-y-5 overflow-y-auto flex-1">
                <div class="flex items-center justify-between border-b border-slate-900 pb-3">
                    <div>
                        <h2 id="display-group-name" class="font-bold text-white text-sm truncate max-w-[180px]">Active Group</h2>
                        <p class="text-[10px] font-mono text-slate-500 mt-0.5">Invite Code: <span id="display-group-id" class="select-all cursor-pointer hover:text-blue-400">---</span></p>
                    </div>
                    <button id="btn-logout" class="text-slate-400 hover:text-red-400 text-[10px] uppercase font-bold px-2.5 py-1 rounded bg-slate-900 border border-slate-800 transition-all">Leave</button>
                </div>

                <!-- Status Counters -->
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-slate-900/50 border border-slate-900 p-2 rounded-xl">
                        <div class="text-[9px] font-bold text-slate-500 uppercase">People</div>
                        <div id="cnt-total" class="text-base font-bold text-white mt-0.5">0</div>
                    </div>
                    <div class="bg-slate-900/50 border border-slate-900 p-2 rounded-xl">
                        <div class="text-[9px] font-bold text-amber-500/80 uppercase">Outside</div>
                        <div id="cnt-breach" class="text-base font-bold text-amber-500 mt-0.5">0</div>
                    </div>
                    <div class="bg-slate-900/50 border border-slate-900 p-2 rounded-xl">
                        <div class="text-[9px] font-bold text-red-500/80 uppercase">SOS</div>
                        <div id="cnt-alert" class="text-base font-bold text-red-500 mt-0.5">0</div>
                    </div>
                </div>

                <!-- Active Group Roster List -->
                <div class="space-y-2">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Group Members</h3>
                    <ul id="member-list" class="space-y-1.5 max-h-[220px] overflow-y-auto pr-1">
                        <!-- Filled dynamically -->
                    </ul>
                </div>
            </div>

            <!-- Emergency Controls Bottom Layout -->
            <div class="p-4 border-t border-slate-900 bg-slate-950/80 space-y-2 shrink-0">
                <button id="btn-ble-connect" class="w-full bg-slate-900 hover:bg-slate-800 text-slate-200 border border-slate-800 font-bold text-[11px] uppercase py-3 px-4 rounded-xl tracking-wider transition-all flex items-center justify-center gap-2">
                    <span class="h-2 w-2 rounded-full bg-blue-500 animate-pulse"></span> Pair Emergency Button Hardware
                </button>
                <button id="btn-panic" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold text-[11px] uppercase py-3 rounded-xl tracking-wider transition-all">
                    Send Emergency SOS
                </button>
                <button id="btn-hard-reset" class="w-full text-slate-600 hover:text-slate-400 text-[9px] font-mono uppercase tracking-widest text-center block pt-1">Reset App</button>
            </div>
        </div>

        <!-- Main Map Area Viewport -->
        <div class="flex-1 relative bg-slate-900">
            <div id="map"></div>
        </div>
    </div>

    <!-- Web Audio Node Placeholder Engine -->
    <div id="radar-audio-engine" data-active="false"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsW2XrO_oBpeTWOlFJKa54bLVlp_ZODtU",
            authDomain: "tabish-s-webapp.firebaseapp.com",
            databaseURL: "https://tabish-s-webapp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tabish-s-webapp",
            storageBucket: "tabish-s-webapp.firebasestorage.app",
            messagingSenderId: "207254103537",
            appId: "1:207254103537:web:f7b8cdd68deb3328cb1050",
            measurementId: "G-MGGR7MJBEC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Core App Variables Setup
        let currentGroupId = localStorage.getItem('geo_group_id') || null;
        let currentUserId = localStorage.getItem('geo_user_id') || ('user_' + Math.random().toString(36).substring(2, 9));
        let currentUsername = localStorage.getItem('geo_username') || "";
        localStorage.setItem('geo_user_id', currentUserId);

        let map = null;
        let wakeLock = null;
        let mapMarkers = {};
        let mapPolylines = {}; 
        let activeGeofencePolygon = null; 
        let isGroupCreator = false; 
        let activeEmergencyUserIds = [];

        let lastValidLat = null;
        let lastValidLng = null;
        const MIN_MOVEMENT_THRESHOLD = 0.0001; 

        const BLE_SERVICE_UUID = "4fa4c201-1fb2-45fe-a28a-75dec6c0e453";
        const BLE_CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const setupPanel = document.getElementById('setup-panel');
        const trackingPanel = document.getElementById('tracking-panel');
        const usernameInput = document.getElementById('username');
        const emergencyBanner = document.getElementById('emergency-banner');
        const emergencyMsg = document.getElementById('emergency-msg');
        const dismissEmergencyBtn = document.getElementById('dismiss-emergency');

        const STORAGE_KEY = `geoguard_offline_buffer_${currentUserId}`;

        let audioCtx = null;
        let alarmIntervalId = null;

        function playSynthesizedAlarmTone() {
            const audioEngine = document.getElementById('radar-audio-engine');
            if (!audioEngine || audioEngine.getAttribute('data-active') === 'true') return;
            
            audioEngine.setAttribute('data-active', 'true');
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            alarmIntervalId = setInterval(() => {
                if (!audioCtx) return;
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            }, 600); 
        }

        function stopSynthesizedAlarmTone() {
            const audioEngine = document.getElementById('radar-audio-engine');
            if (audioEngine) audioEngine.setAttribute('data-active', 'false');
            if (alarmIntervalId) {
                clearInterval(alarmIntervalId);
                alarmIntervalId = null;
            }
        }

        function bufferLocationOffline(lat, lng) {
            try {
                let buffer = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                buffer.push({ lat: lat, lng: lng, timestamp: Date.now() });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(buffer));
            } catch (e) { console.error(e); }
        }

        function flushOfflineBuffer() {
            if (!navigator.onLine || !currentGroupId) return;
            try {
                let buffer = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                if (buffer.length === 0) return;
                const historyRef = ref(db, `groups/${currentGroupId}/members/${currentUserId}/history`);
                buffer.forEach(point => { push(historyRef, point); });
                localStorage.removeItem(STORAGE_KEY);
            } catch (e) { console.error(e); }
        }

        window.addEventListener('online', flushOfflineBuffer);

        // Automatic Session Recovery Handling
        if (currentGroupId && currentUsername) {
            if (setupPanel) setupPanel.classList.add('hidden');
            if (trackingPanel) trackingPanel.classList.remove('hidden');
            
            get(ref(db, `groups/${currentGroupId}/guideId`)).then((snapshot) => {
                if (snapshot.exists() && snapshot.val() === currentUserId) {
                    isGroupCreator = true;
                }
                
                const unlockOverlay = document.createElement('div');
                unlockOverlay.id = 'audio-unlock-shutter';
                unlockOverlay.className = 'fixed inset-0 bg-slate-950/95 z-[99999] flex flex-col items-center justify-center p-6 text-center gap-4';
                unlockOverlay.innerHTML = `
                    <h3 class="text-white font-bold text-lg uppercase tracking-wide">Welcome Back</h3>
                    <p class="text-slate-400 text-xs max-w-xs leading-relaxed">Tap below to enter your map tracking room.</p>
                    <button id="btn-audio-activate" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase px-6 py-3 rounded-xl tracking-wider transition-all mt-2">
                        Enter Room
                    </button>
                `;
                document.body.appendChild(unlockOverlay);

                document.getElementById('btn-audio-activate').addEventListener('click', () => {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    unlockOverlay.remove();
                    requestScreenWakeLock();
                    initiateMappingSystem();
                    startLiveGeolocationTracking();
                    listenToGroupRealtimeChanges();
                });
            });
        }

        async function requestScreenWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
        }

        document.getElementById('btn-create-mode').addEventListener('click', () => {
            document.getElementById('create-group-box').classList.remove('hidden');
            document.getElementById('join-group-box').classList.add('hidden');
        });

        document.getElementById('btn-join-mode').addEventListener('click', () => {
            document.getElementById('join-group-box').classList.remove('hidden');
            document.getElementById('create-group-box').classList.add('hidden');
        });

        document.getElementById('btn-submit-create').addEventListener('click', () => {
            currentUsername = usernameInput.value.trim();
            const groupName = document.getElementById('group-name').value.trim();
            if(!currentUsername || !groupName) return alert("Please type in your name and a group name.");

            const groupsRef = ref(db, 'groups');
            const newGroupRef = push(groupsRef);
            currentGroupId = newGroupRef.key;
            isGroupCreator = true; 

            set(newGroupRef, { groupName: groupName, createdAt: Date.now(), guideId: currentUserId }).then(() => {
                commitSessionToStorage(currentGroupId, currentUsername);
            });
        });

        document.getElementById('btn-submit-join').addEventListener('click', () => {
            currentUsername = usernameInput.value.trim();
            currentGroupId = document.getElementById('target-group-id').value.trim();
            if(!currentUsername || !currentGroupId) return alert("Please fill in both fields.");
            isGroupCreator = false; 
            commitSessionToStorage(currentGroupId, currentUsername);
        });

        function commitSessionToStorage(groupId, name) {
            localStorage.setItem('geo_group_id', groupId);
            localStorage.setItem('geo_username', name);
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const memberRef = ref(db, `groups/${groupId}/members/${currentUserId}`);
            set(memberRef, { name: name, lat: 0.0, lng: 0.0, isEmergency: false }).then(() => {
                if (setupPanel) setupPanel.classList.add('hidden');
                if (trackingPanel) trackingPanel.classList.remove('hidden');
                requestScreenWakeLock(); 
                initiateMappingSystem();
                startLiveGeolocationTracking();
                listenToGroupRealtimeChanges();
            });
        }

        // Setup Map View
        function initiateMappingSystem() {
            try {
                if (map !== null) { map.remove(); map = null; }
                const mapEl = document.getElementById('map');
                if (!mapEl) return;

                map = L.map('map', { zoomControl: false, trackResize: true }).setView([30.3753, 69.3451], 5);
                L.control.zoom({ position: 'topright' }).addTo(map);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors',
                    maxZoom: 19,
                    crossOrigin: true
                }).addTo(map);

                const drawnItems = new L.FeatureGroup();
                map.addLayer(drawnItems);

                if (isGroupCreator) {
                    const drawControl = new L.Control.Draw({
                        position: 'topleft',
                        draw: {
                            polygon: { allowIntersection: false, showArea: true, shapeOptions: { color: '#2563eb', fillColor: '#3b82f6', fillOpacity: 0.2, weight: 3 } },
                            polyline: false, circle: false, rectangle: false, marker: false, circlemarker: false
                        },
                        edit: { featureGroup: drawnItems, remove: true }
                    });
                    map.addControl(drawControl);

                    map.on(L.Draw.Event.CREATED, function (e) {
                        if (activeGeofencePolygon) { drawnItems.removeLayer(activeGeofencePolygon); }
                        activeGeofencePolygon = e.layer;
                        activeGeofencePolygon.setStyle({ color: '#ea580c', fillColor: '#f97316', fillOpacity: 0.15, weight: 3 });
                        drawnItems.addLayer(activeGeofencePolygon);
                    });

                    map.on(L.Draw.Event.DELETED, function () { activeGeofencePolygon = null; });
                }
                
                map.invalidateSize();
            } catch (err) { console.error(err); }
        }

        function isPointInPolygon(lat, lng, polygon) {
            if (!polygon || !polygon.getLatLngs) return true;
            try {
                const latlngs = polygon.getLatLngs()[0];
                let inside = false;
                for (let i = 0, j = latlngs.length - 1; i < latlngs.length; j = i++) {
                    const xi = latlngs[i].lat, yi = latlngs[i].lng;
                    const xj = latlngs[j].lat, yj = latlngs[j].lng;
                    const intersect = ((yi > lng) !== (yj > lng)) && (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi);
                    if (intersect) inside = !inside;
                }
                return inside;
            } catch(e) { return true; }
        }

        function startLiveGeolocationTracking() {
            if ("geolocation" in navigator) {
                // FORCE an instant high-accuracy lookup immediately on start
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    lastValidLat = lat;
                    lastValidLng = lng;
                    if(currentGroupId) {
                        set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/lat`), lat);
                        set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/lng`), lng);
                    }
                }, (error) => console.error("Initial GPS grab failed:", error), { enableHighAccuracy: true });

                // Keep watching continuously
                navigator.geolocation.watchPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    if (accuracy > 30) return; 

                    if (lastValidLat !== null && lastValidLng !== null) {
                        const latDelta = Math.abs(lat - lastValidLat);
                        const lngDelta = Math.abs(lng - lastValidLng);
                        if (latDelta < MIN_MOVEMENT_THRESHOLD && lngDelta < MIN_MOVEMENT_THRESHOLD) return;
                    }

                    lastValidLat = lat;
                    lastValidLng = lng;
                    
                    if(currentGroupId) {
                        if (navigator.onLine) {
                            set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/lat`), lat);
                            set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/lng`), lng);
                            push(ref(db, `groups/${currentGroupId}/members/${currentUserId}/history`), { lat: lat, lng: lng, timestamp: Date.now() });
                            flushOfflineBuffer();
                        } else {
                            bufferLocationOffline(lat, lng);
                        }
                    }
                }, (error) => console.error(error), { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
            }
        }

        function listenToGroupRealtimeChanges() {
            if (!currentGroupId) return;

            onValue(ref(db, `groups/${currentGroupId}/groupName`), (snapshot) => {
                const nameNode = document.getElementById('display-group-name');
                if(nameNode) nameNode.innerText = snapshot.val() || "Active Group";
                document.getElementById('display-group-id').innerText = currentGroupId;
            });

            onValue(ref(db, `groups/${currentGroupId}/members`), (snapshot) => {
                const members = snapshot.val() || {};
                const rosterList = document.getElementById('member-list');
                if(!rosterList) return;
                rosterList.innerHTML = ""; 

                let groupAlertTriggered = false;
                let compositeAlertMsg = "";
                let activeNodes = 0;
                let totalBreaches = 0;
                let totalAlerts = 0;
                activeEmergencyUserIds = [];

                Object.keys(members).forEach(userId => {
                    const data = members[userId];
                    if(!data) return;

                    activeNodes++;
                    
                    // Track alerts immediately (even if map position hasn't updated yet)
                    if (data.isEmergency) {
                        totalAlerts++;
                        activeEmergencyUserIds.push(userId);
                        groupAlertTriggered = true;
                        compositeAlertMsg = (data.name || 'Someone').toUpperCase() + " [SOS ALARM]";
                    }

                    const hasValidCoords = (data.lat !== undefined && data.lng !== undefined && data.lat !== 0 && data.lng !== 0);
                    let hasBreachedGeofence = false;

                    if (hasValidCoords) {
                        const isInsideSafeZone = isPointInPolygon(data.lat, data.lng, activeGeofencePolygon);
                        hasBreachedGeofence = !isInsideSafeZone;
                        if (hasBreachedGeofence) {
                            totalBreaches++;
                            groupAlertTriggered = true;
                            if (!data.isEmergency) {
                                compositeAlertMsg = (data.name || 'Someone').toUpperCase() + " [LEFT AREA]";
                            }
                        }
                    }

                    // Update left panel text list
                    const li = document.createElement('li');
                    li.className = `p-3 rounded-xl border flex flex-col gap-1 text-xs ${
                        data.isEmergency ? 'bg-red-500 text-white border-red-600 font-bold' : hasBreachedGeofence ? 'bg-amber-500 text-slate-900 border-amber-600 font-semibold' : 'bg-slate-800 text-slate-100 border-slate-700'
                    }`;
                    
                    li.innerHTML = `
                        <div class="flex items-center justify-between">
                            <span>${data.name || 'Unknown'} ${userId === currentUserId ? '(You)' : ''}</span>
                            <span class="text-[9px] font-mono tracking-wider px-1.5 py-0.5 rounded uppercase bg-black/20">${
                                data.isEmergency ? 'SOS' : hasBreachedGeofence ? 'OUTSIDE' : hasValidCoords ? 'OK' : 'WAITING FOR GPS'
                            }</span>
                        </div>
                    `;
                    rosterList.appendChild(li);

                    // Render marker on the map ONLY if coords are valid
                    if (hasValidCoords && map) {
                        const markerColor = data.isEmergency ? 'red' : hasBreachedGeofence ? 'orange' : 'blue';
                        const targetIcon = L.icon({
                            iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${markerColor}.png`,
                            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                        });

                        if (mapMarkers[userId]) {
                            mapMarkers[userId].setLatLng([data.lat, data.lng]);
                            mapMarkers[userId].setIcon(targetIcon);
                        } else {
                            mapMarkers[userId] = L.marker([data.lat, data.lng], { icon: targetIcon }).addTo(map);
                        }

                        if (data.history) {
                            const trailPoints = Object.keys(data.history).map(key => [data.history[key].lat, data.history[key].lng]);
                            if (mapPolylines[userId]) {
                                mapPolylines[userId].setLatLngs(trailPoints);
                            } else {
                                mapPolylines[userId] = L.polyline(trailPoints, { color: userId === currentUserId ? '#2563eb' : '#16a34a', weight: 4, opacity: 0.85 }).addTo(map);
                            }
                        }
                    }
                });

                document.getElementById('cnt-total').innerText = activeNodes;
                document.getElementById('cnt-breach').innerText = totalBreaches;
                document.getElementById('cnt-alert').innerText = totalAlerts;

                if (groupAlertTriggered) {
                    if (emergencyMsg) emergencyMsg.innerText = compositeAlertMsg;
                    if (emergencyBanner) emergencyBanner.classList.remove('hidden');
                    
                    if (isGroupCreator || activeEmergencyUserIds.includes(currentUserId)) {
                        dismissEmergencyBtn.classList.remove('hidden');
                    } else {
                        dismissEmergencyBtn.classList.add('hidden');
                    }
                    
                    playSynthesizedAlarmTone();
                } else {
                    if (emergencyBanner) emergencyBanner.classList.add('hidden');
                    stopSynthesizedAlarmTone();
                }
            });
        }

        const handleLogoutAndClear = () => {
            localStorage.clear();
            window.location.reload();
        };
        document.getElementById('btn-logout').addEventListener('click', handleLogoutAndClear);
        document.getElementById('btn-hard-reset').addEventListener('click', handleLogoutAndClear);

        // Hardware pairing module
        document.getElementById('btn-ble-connect').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'GeoGuard_Button' }], optionalServices: [BLE_SERVICE_UUID] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(BLE_SERVICE_UUID);
                const characteristic = await service.getCharacteristic(BLE_CHARACTERISTIC_UUID);
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const value = event.target.value.getUint8(0);
                    if(currentGroupId) set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), value === 1);
                });
            } catch (error) { console.error(error); }
        });

        document.getElementById('btn-panic').addEventListener('click', () => {
            if(currentGroupId) set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), true);
        });
        
        document.getElementById('dismiss-emergency').addEventListener('click', () => {
            if (!currentGroupId) return;
            
            if (isGroupCreator) {
                activeEmergencyUserIds.forEach(id => {
                    set(ref(db, `groups/${currentGroupId}/members/${id}/isEmergency`), false);
                });
            } else if (activeEmergencyUserIds.includes(currentUserId)) {
                set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), false);
            }
        });
    </script>
</body>
</html>
