<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuard - Tourist Group Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 50vh; width: 100%; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <div id="emergency-banner" class="hidden bg-red-600 text-white text-center py-4 font-bold text-lg animate-pulse sticky top-0 z-[1000]">
        ⚠️ EMERGENCY: <span id="emergency-msg">Someone</span> NEEDS HELP!
        <button id="dismiss-emergency" class="ml-4 bg-white text-red-600 px-3 py-1 rounded text-sm font-semibold">Dismiss</button>
    </div>

    <header class="bg-blue-600 text-white p-4 text-center shadow-md">
        <h1 class="text-2xl font-bold">🗺️ GeoGuard Tracker</h1>
        <p class="text-xs opacity-80">Real-time Guide & Tourist Safety System</p>
    </header>

    <main id="setup-panel" class="p-4 flex-1 flex flex-col justify-center max-w-md mx-auto w-full gap-6">
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-lg font-semibold mb-3">1. Enter Your Name</h2>
            <input type="text" id="username" placeholder="Your name (e.g., Ali)" class="w-full border p-2 rounded focus:outline-blue-500">
        </div>

        <div class="bg-white p-6 rounded-lg shadow space-y-4">
            <h2 class="text-lg font-semibold">2. Choose Your Role</h2>
            
            <div class="border-t pt-4">
                <button id="btn-create-mode" class="w-full bg-blue-600 text-white py-2 rounded font-medium hover:bg-blue-700">I am a Guide (Create Group)</button>
                <div id="create-group-box" class="hidden mt-3 space-y-2">
                    <input type="text" id="group-name" placeholder="E.g., Swat Valley Tour" class="w-full border p-2 rounded">
                    <button id="btn-submit-create" class="w-full bg-emerald-600 text-white py-2 rounded text-sm font-semibold">Create Group</button>
                </div>
            </div>

            <div class="border-t pt-4">
                <button id="btn-join-mode" class="w-full bg-gray-600 text-white py-2 rounded font-medium hover:bg-gray-700">I am a Tourist (Join Group)</button>
                <div id="join-group-box" class="hidden mt-3 space-y-2">
                    <input type="text" id="target-group-id" placeholder="Paste Group ID here" class="w-full border p-2 rounded">
                    <button id="btn-submit-join" class="w-full bg-emerald-600 text-white py-2 rounded text-sm font-semibold">Join Group</button>
                </div>
            </div>
        </div>
    </main>

    <main id="tracking-panel" class="hidden flex-1 flex flex-col">
        <div class="bg-white p-3 shadow-sm flex justify-between items-center text-sm border-b">
            <div>
                <p class="font-bold text-gray-700" id="display-group-name">Group: Loading...</p>
                <p class="text-xs text-gray-500 font-mono select-all" id="display-group-id">ID: </p>
            </div>
            <div class="flex items-center gap-2">
                <button id="btn-ble-connect" class="bg-blue-500 text-white px-3 py-2 rounded-full font-bold shadow hover:bg-blue-600 text-xs transition-all">
                    🔗 PAIR HARDWARE
                </button>
                <button id="btn-panic" class="bg-red-600 text-white px-4 py-2 rounded-full font-bold shadow hover:bg-red-700 animate-bounce">
                    🚨 PANIC BUTTON
                </button>
            </div>
        </div>

        <div id="map" class="flex-1"></div>
        
        <div class="bg-white p-4 h-1/4 overflow-y-auto border-t">
            <h3 class="font-semibold text-gray-700 mb-2 border-b pb-1">Group Members</h3>
            <ul id="member-list" class="divide-y text-sm"></ul>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsW2XrO_oBpeTWOlFJKa54bLVlp_ZODtU",
            authDomain: "tabish-s-webapp.firebaseapp.com",
            databaseURL: "https://tabish-s-webapp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tabish-s-webapp",
            storageBucket: "tabish-s-webapp.firebasestorage.app",
            messagingSenderId: "207254103537",
            appId: "1:207254103537:web:f7b8cdd68deb3328cb1050",
            measurementId: "G-MGGR7MJBEC"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentGroupId = null;
        let currentUserId = 'user_' + Math.random().toString(36).substring(2, 9);
        let currentUsername = "";
        let map = null;
        let mapMarkers = {};

        // Bluetooth UUID Definitions matching ESP32 firmware configurations
        const BLE_SERVICE_UUID = "4fa4c201-1fb2-45fe-a28a-75dec6c0e453";
        const BLE_CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        // Asset Links for Leaflet Marker Icons
        const blueIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        const redIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        const setupPanel = document.getElementById('setup-panel');
        const trackingPanel = document.getElementById('tracking-panel');
        const usernameInput = document.getElementById('username');
        const emergencyBanner = document.getElementById('emergency-banner');
        const emergencyMsg = document.getElementById('emergency-msg');

        // Toggle UI Box Forms
        document.getElementById('btn-create-mode').addEventListener('click', () => {
            document.getElementById('create-group-box').classList.toggle('hidden');
            document.getElementById('join-group-box').classList.add('hidden');
        });
        document.getElementById('btn-join-mode').addEventListener('click', () => {
            document.getElementById('join-group-box').classList.toggle('hidden');
            document.getElementById('create-group-box').classList.add('hidden');
        });

        // Guide Action
        document.getElementById('btn-submit-create').addEventListener('click', () => {
            currentUsername = usernameInput.value.trim();
            const groupName = document.getElementById('group-name').value.trim();
            if(!currentUsername || !groupName) return alert("Please type your name and a group name.");

            const groupsRef = ref(db, 'groups');
            const newGroupRef = push(groupsRef);
            currentGroupId = newGroupRef.key;

            set(newGroupRef, {
                groupName: groupName,
                createdAt: Date.now(),
                guideId: currentUserId
            }).then(() => {
                joinGroupRoster(currentGroupId, currentUsername);
            });
        });

        // Tourist Action
        document.getElementById('btn-submit-join').addEventListener('click', () => {
            currentUsername = usernameInput.value.trim();
            currentGroupId = document.getElementById('target-group-id').value.trim();
            if(!currentUsername || !currentGroupId) return alert("Please fill in your name and Group ID.");
            joinGroupRoster(currentGroupId, currentUsername);
        });

        function joinGroupRoster(groupId, name) {
            const memberRef = ref(db, `groups/${groupId}/members/${currentUserId}`);
            set(memberRef, {
                name: name,
                lat: 0.0,
                lng: 0.0,
                isEmergency: false
            }).then(() => {
                setupPanel.classList.add('hidden');
                trackingPanel.classList.remove('hidden');
                initiateMappingSystem();
                startLiveGeolocationTracking();
                listenToGroupRealtimeChanges();
            });
        }

        function initiateMappingSystem() {
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }

        function startLiveGeolocationTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/lat`), lat);
                    set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/lng`), lng);
                }, (error) => {
                    console.error("GPS Error: ", error);
                }, { enableHighAccuracy: true });
            } else {
                alert("GPS not supported by your browser.");
            }
        }

        function listenToGroupRealtimeChanges() {
            onValue(ref(db, `groups/${currentGroupId}/groupName`), (snapshot) => {
                document.getElementById('display-group-name').innerText = `Group: ${snapshot.val()}`;
                document.getElementById('display-group-id').innerText = `ID: ${currentGroupId}`;
            });

            onValue(ref(db, `groups/${currentGroupId}/members`), (snapshot) => {
                const members = snapshot.val() || {};
                const rosterList = document.getElementById('member-list');
                rosterList.innerHTML = ""; 

                let emergencyDetected = false;
                let emergencyTargetName = "";
                let bounds = [];

                Object.keys(members).forEach(userId => {
                    const data = members[userId];
                    if(data.lat === 0 && data.lng === 0) return;

                    bounds.push([data.lat, data.lng]);

                    const li = document.createElement('li');
                    li.className = `py-2 flex justify-between ${data.isEmergency ? 'bg-red-100 font-bold text-red-600 px-2' : ''}`;
                    li.innerHTML = `<span>${data.name} ${userId === currentUserId ? '(You)' : ''}</span> 
                                    <span class="text-xs opacity-75">${data.lat.toFixed(4)}, ${data.lng.toFixed(4)}</span>`;
                    rosterList.appendChild(li);

                    if(data.isEmergency) {
                        emergencyDetected = true;
                        emergencyTargetName = data.name;
                    }

                    // Dynamic Pin Position Allocation and Color Rendering Updates
                    if (mapMarkers[userId]) {
                        mapMarkers[userId].setLatLng([data.lat, data.lng]);
                        mapMarkers[userId].setIcon(data.isEmergency ? redIcon : blueIcon);
                    } else {
                        mapMarkers[userId] = L.marker([data.lat, data.lng], {
                            icon: data.isEmergency ? redIcon : blueIcon
                        }).addTo(map);
                    }
                    mapMarkers[userId].bindPopup(`<b>${data.name}</b><br>${data.isEmergency ? '🚨 EMERGENCY' : 'Safe'}`);
                });

                if(bounds.length > 0) {
                    map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
                }

                if(emergencyDetected) {
                    emergencyMsg.innerText = emergencyTargetName.toUpperCase();
                    emergencyBanner.classList.remove('hidden');
                } else {
                    emergencyBanner.classList.add('hidden');
                }
            });
        }

        // Web Bluetooth Browser Framework Connection Handler
        document.getElementById('btn-ble-connect').addEventListener('click', async () => {
            const bleButton = document.getElementById('btn-ble-connect');
            try {
                bleButton.innerText = "⏳ SCANNING...";
                
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'GeoGuard_Button' }],
                    optionalServices: [BLE_SERVICE_UUID]
                });

                bleButton.innerText = "⏳ CONNECTING...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(BLE_SERVICE_UUID);
                const characteristic = await service.getCharacteristic(BLE_CHARACTERISTIC_UUID);

                await characteristic.startNotifications();
                
                bleButton.innerText = "✅ PAIRED";
                bleButton.classList.replace('bg-blue-500', 'bg-emerald-600');

                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const value = event.target.value.getUint8(0);
                    // Value 1 is dispatched by ESP32 Active LOW handler during push triggers
                    if (value === 1) {
                        set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), true);
                    } else if (value === 0) {
                        set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), false);
                    }
                });

                device.addEventListener('gattserverdisconnected', () => {
                    bleButton.innerText = "❌ DISCONNECTED";
                    bleButton.classList.replace('bg-emerald-600', 'bg-red-500');
                });

            } catch (error) {
                console.error('Web Bluetooth Error:', error);
                bleButton.innerText = "⚠️ RE-TRY PAIR";
                alert('Bluetooth pairing unsuccessful: ' + error.message);
            }
        });

        document.getElementById('btn-panic').addEventListener('click', () => {
            set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), true);
        });

        document.getElementById('dismiss-emergency').addEventListener('click', () => {
            set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), false);
        });
    </script>
</body>
</html>
