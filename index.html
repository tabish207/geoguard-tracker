<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuard Terminal - Clear Sight Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 🚨 CRITICAL STRUCTURAL FIX: Force structural container dimensions */
        #map-container {
            position: relative;
            width: 100%;
            height: 60vh; /* Fallback for mobile */
        }
        @media (min-width: 768px) {
            #map-container { height: 100vh !important; }
        }
        #map { 
            position: absolute !important;
            top: 0; bottom: 0; left: 0; right: 0;
            width: 100% !important;
            height: 100% !important;
            background: #cbd5e1 !important; 
        }
        
        .leaflet-draw-toolbar a { background-color: #ffffff !important; color: #0f172a !important; border-color: #cbd5e1 !important; }
        .leaflet-draw-actions a { background-color: #334155 !important; color: #ffffff !important; }
        
        .custom-popup .leaflet-popup-content-wrapper {
            background: #1e293b; color: #f8fafc; border-radius: 12px; padding: 4px;
        }
        .custom-popup .leaflet-popup-tip { background: #1e293b; }
    </style>
</head>
<body class="bg-[#f1f5f9] text-[#0f172a] min-h-screen flex flex-col antialiased">

    <div id="emergency-banner" class="hidden bg-gradient-to-r from-red-600 to-rose-700 text-white text-center py-3 font-bold text-sm tracking-wide uppercase shadow-lg sticky top-0 z-[9999] border-b border-red-700">
        <span class="inline-flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-white animate-ping"></span>
            ALERT TRIGGERED: <span id="emergency-msg" class="underline decoration-2">System Broadcast Active</span>
        </span>
        <button id="dismiss-emergency" class="ml-6 bg-white text-red-700 px-4 py-1 rounded-md text-xs font-bold shadow hover:bg-slate-100 transition-all">Clear Threat State</button>
    </div>

    <main id="setup-panel" class="p-6 flex-1 flex flex-col justify-center max-w-md mx-auto w-full gap-6 my-auto">
        <div class="text-center space-y-1">
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">GEOGUARD LIVE</h1>
            <p class="text-sm text-slate-500 font-medium">Precision Management Interface & Telemetry Hub</p>
        </div>

        <div class="bg-white border border-slate-200 p-6 rounded-2xl shadow-xl space-y-5">
            <div class="space-y-1.5">
                <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Operator Designation</label>
                <input type="text" id="username" placeholder="Type name or callsign..." class="w-full bg-slate-50 border border-slate-300 p-3 rounded-xl text-slate-900 focus:outline-none focus:border-blue-600 font-medium transition-all">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button id="btn-create-mode" class="p-4 rounded-xl bg-slate-100 hover:bg-slate-200 border border-slate-200 font-semibold text-sm transition-all">Initiate Group</button>
                <button id="btn-join-mode" class="p-4 rounded-xl bg-slate-100 hover:bg-slate-200 border border-slate-200 font-semibold text-sm transition-all">Join Session</button>
            </div>

            <div id="create-group-box" class="hidden space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-200">
                <input type="text" id="group-name" placeholder="Deployment Area (e.g., Swat Valley)" class="w-full bg-white border border-slate-300 p-2.5 rounded-lg text-sm text-slate-900">
                <button id="btn-submit-create" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg text-sm font-bold shadow-md transition-all">Generate Control Domain</button>
            </div>

            <div id="join-group-box" class="hidden space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-200">
                <input type="text" id="target-group-id" placeholder="Paste Session Security Key..." class="w-full bg-white border border-slate-300 p-2.5 rounded-lg text-sm font-mono text-slate-900">
                <button id="btn-submit-join" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-lg text-sm font-bold shadow-md transition-all">Connect Stream</button>
            </div>
        </div>
    </main>

    <main id="tracking-panel" class="hidden flex-1 flex flex-col md:flex-row h-screen max-h-screen overflow-hidden">
        
        <aside class="w-full md:w-80 bg-slate-900 text-slate-100 flex flex-col h-2/5 md:h-full shadow-2xl z-20">
            <div class="p-4 border-b border-slate-800 bg-slate-950/40">
                <h2 class="font-bold text-base text-white tracking-wide line-clamp-1" id="display-group-name">Active Session</h2>
                <div class="mt-2 bg-slate-900 border border-slate-800 rounded-md p-2 flex items-center justify-between">
                    <span class="text-[10px] font-mono text-slate-500 font-bold uppercase">Key:</span>
                    <span class="text-xs font-mono text-blue-400 font-medium select-all cursor-pointer" id="display-group-id">---</span>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-1.5 p-3 bg-slate-950/20 border-b border-slate-800 text-center">
                <div class="bg-slate-800/60 p-2 rounded-xl border border-slate-800">
                    <p class="text-[10px] text-slate-400 font-semibold uppercase">Total</p>
                    <p class="text-lg font-bold font-mono text-white mt-0.5" id="cnt-total">0</p>
                </div>
                <div class="bg-amber-500/10 p-2 rounded-xl border border-amber-500/20">
                    <p class="text-[10px] text-amber-400 font-semibold uppercase">Breach</p>
                    <p class="text-lg font-bold font-mono text-amber-400 mt-0.5" id="cnt-breach">0</p>
                </div>
                <div class="bg-rose-500/10 p-2 rounded-xl border border-rose-500/20">
                    <p class="text-[10px] text-rose-400 font-semibold uppercase">SOS</p>
                    <p class="text-lg font-bold font-mono text-rose-400 mt-0.5" id="cnt-alert">0</p>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-3 space-y-2">
                <p class="text-[11px] font-bold uppercase tracking-wider text-slate-500 px-1">Operator Grid Diagnostics</p>
                <ul id="member-list" class="space-y-1.5"></ul>
            </div>

            <div class="p-3 border-t border-slate-800 bg-slate-950/30 flex flex-col gap-2">
                <button id="btn-ble-connect" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-2.5 rounded-lg font-bold text-xs tracking-wide transition-all border border-slate-700 uppercase">
                    Connect Hardware Component
                </button>
                <button id="btn-panic" class="w-full bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-lg font-bold text-xs tracking-wider shadow-md transition-all uppercase">
                    Trigger Local SOS Panic
                </button>
            </div>
        </aside>

        <section id="map-container" class="flex-1">
            <div id="map"></div>
        </section>
    </main>

    <audio id="siren-audio" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" loop></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsW2XrO_oBpeTWOlFJKa54bLVlp_ZODtU",
            authDomain: "tabish-s-webapp.firebaseapp.com",
            databaseURL: "https://tabish-s-webapp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tabish-s-webapp",
            storageBucket: "tabish-s-webapp.firebasestorage.app",
            messagingSenderId: "207254103537",
            appId: "1:207254103537:web:f7b8cdd68deb3328cb1050",
            measurementId: "G-MGGR7MJBEC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentGroupId = null;
        let currentUserId = 'user_' + Math.random().toString(36).substring(2, 9);
        let currentUsername = "";
        let map = null;
        let wakeLock = null;
        
        let mapMarkers = {};
        let mapPolylines = {}; 
        let activeGeofencePolygon = null; 

        const BLE_SERVICE_UUID = "4fa4c201-1fb2-45fe-a28a-75dec6c0e453";
        const BLE_CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const setupPanel = document.getElementById('setup-panel');
        const trackingPanel = document.getElementById('tracking-panel');
        const usernameInput = document.getElementById('username');
        const emergencyBanner = document.getElementById('emergency-banner');
        const emergencyMsg = document.getElementById('emergency-msg');
        const siren = document.getElementById('siren-audio');

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js', { scope: './' }).catch(() => {});
            Notification.requestPermission();
        }

        async function requestScreenWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
        }

        document.getElementById('btn-create-mode').addEventListener('click', () => {
            document.getElementById('create-group-box').classList.toggle('hidden');
            document.getElementById('join-group-box').classList.add('hidden');
        });
        document.getElementById('btn-join-mode').addEventListener('click', () => {
            document.getElementById('join-group-box').classList.toggle('hidden');
            document.getElementById('create-group-box').classList.add('hidden');
        });

        document.getElementById('btn-submit-create').addEventListener('click', () => {
            currentUsername = usernameInput.value.trim();
            const groupName = document.getElementById('group-name').value.trim();
            if(!currentUsername || !groupName) return alert("Verify core fields.");

            const groupsRef = ref(db, 'groups');
            const newGroupRef = push(groupsRef);
            currentGroupId = newGroupRef.key;

            set(newGroupRef, { groupName: groupName, createdAt: Date.now(), guideId: currentUserId }).then(() => {
                joinGroupRoster(currentGroupId, currentUsername);
            });
        });

        document.getElementById('btn-submit-join').addEventListener('click', () => {
            currentUsername = usernameInput.value.trim();
            currentGroupId = document.getElementById('target-group-id').value.trim();
            if(!currentUsername || !currentGroupId) return alert("Verify submission fields.");
            joinGroupRoster(currentGroupId, currentUsername);
        });

        function joinGroupRoster(groupId, name) {
            const memberRef = ref(db, `groups/${groupId}/members/${currentUserId}`);
            set(memberRef, { name: name, lat: 0.0, lng: 0.0, isEmergency: false }).then(() => {
                setupPanel.classList.add('hidden');
                trackingPanel.classList.remove('hidden');
                requestScreenWakeLock(); 
                initiateMappingSystem();
                startLiveGeolocationTracking();
                listenToGroupRealtimeChanges();
            });
        }

        function initiateMappingSystem() {
            if (map !== null) { map.remove(); }

            map = L.map('map', { zoomControl: false, trackResize: true }).setView([30.3753, 69.3451], 5);
            L.control.zoom({ position: 'topright' }).addTo(map);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '©OpenStreetMap, ©CartoDB',
                maxZoom: 20
            }).addTo(map);

            const drawnItems = new L.FeatureGroup();
            map.addLayer(drawnItems);

            const drawControl = new L.Control.Draw({
                position: 'topleft',
                draw: {
                    polygon: { allowIntersection: false, showArea: true, shapeOptions: { color: '#2563eb', fillColor: '#3b82f6', fillOpacity: 0.2, weight: 3 } },
                    polyline: false, circle: false, rectangle: false, marker: false, circlemarker: false
                },
                edit: { featureGroup: drawnItems, remove: true }
            });
            map.addControl(drawControl);

            map.on(L.Draw.Event.CREATED, function (e) {
                if (activeGeofencePolygon) { drawnItems.removeLayer(activeGeofencePolygon); }
                activeGeofencePolygon = e.layer;
                activeGeofencePolygon.setStyle({ color: '#ea580c', fillColor: '#f97316', fillOpacity: 0.15, weight: 3 });
                drawnItems.addLayer(activeGeofencePolygon);
            });

            map.on(L.Draw.Event.DELETED, function () { activeGeofencePolygon = null; });

            // 🚨 ENGINE RELAY: Double force canvas boundary calculations to snap out of collapsing blocks
            map.invalidateSize();
            setTimeout(() => { map.invalidateSize(); }, 300);
            setTimeout(() => { map.invalidateSize(); }, 800);
        }

        function isPointInPolygon(lat, lng, polygon) {
            if (!polygon) return true;
            const latlngs = polygon.getLatLngs()[0];
            let inside = false;
            for (let i = 0, j = latlngs.length - 1; i < latlngs.length; j = i++) {
                const xi = latlngs[i].lat, yi = latlngs[i].lng;
                const xj = latlngs[j].lat, yj = latlngs[j].lng;
                const intersect = ((yi > lng) !== (yj > lng)) && (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function startLiveGeolocationTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/lat`), lat);
                    set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/lng`), lng);
                    
                    const historyRef = ref(db, `groups/${currentGroupId}/members/${currentUserId}/history`);
                    push(historyRef, { lat: lat, lng: lng, timestamp: Date.now() });
                }, (error) => console.error(error), { enableHighAccuracy: true });
            }
        }

        function listenToGroupRealtimeChanges() {
            onValue(ref(db, `groups/${currentGroupId}/groupName`), (snapshot) => {
                document.getElementById('display-group-name').innerText = snapshot.val();
                document.getElementById('display-group-id').innerText = currentGroupId;
            });

            onValue(ref(db, `groups/${currentGroupId}/members`), (snapshot) => {
                const members = snapshot.val() || {};
                const rosterList = document.getElementById('member-list');
                rosterList.innerHTML = ""; 

                let groupAlertTriggered = false;
                let compositeAlertMsg = "";
                
                let activeNodes = 0;
                let totalBreaches = 0;
                let totalAlerts = 0;

                Object.keys(members).forEach(userId => {
                    const data = members[userId];
                    if(data.lat === 0 && data.lng === 0) return;

                    activeNodes++;

                    const isInsideSafeZone = isPointInPolygon(data.lat, data.lng, activeGeofencePolygon);
                    const hasBreachedGeofence = !isInsideSafeZone;

                    if (hasBreachedGeofence) totalBreaches++;
                    if (data.isEmergency) totalAlerts++;

                    if (data.isEmergency || hasBreachedGeofence) {
                        groupAlertTriggered = true;
                        compositeAlertMsg = data.name.toUpperCase() + (data.isEmergency ? " [SOS]" : " [BREACH]");
                    }

                    const li = document.createElement('li');
                    li.className = `p-3 rounded-xl border flex flex-col gap-1 text-xs ${
                        data.isEmergency ? 'bg-red-500 text-white border-red-600 font-bold' : hasBreachedGeofence ? 'bg-amber-500 text-slate-900 border-amber-600 font-semibold' : 'bg-slate-800 text-slate-100 border-slate-700'
                    }`;
                    
                    li.innerHTML = `
                        <div class="flex items-center justify-between">
                            <span>${data.name} ${userId === currentUserId ? '(You)' : ''}</span>
                            <span class="text-[9px] font-mono tracking-widest px-1.5 py-0.5 rounded uppercase bg-black/20">${
                                data.isEmergency ? 'SOS' : hasBreachedGeofence ? 'BREACH' : 'OK'
                            }</span>
                        </div>
                    `;
                    rosterList.appendChild(li);

                    const markerColor = data.isEmergency ? 'red' : hasBreachedGeofence ? 'orange' : 'blue';
                    const targetIcon = L.icon({
                        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${markerColor}.png`,
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                    });

                    if (mapMarkers[userId]) {
                        mapMarkers[userId].setLatLng([data.lat, data.lng]);
                        mapMarkers[userId].setIcon(targetIcon);
                    } else {
                        mapMarkers[userId] = L.marker([data.lat, data.lng], { icon: targetIcon }).addTo(map);
                    }
                    mapMarkers[userId].bindPopup(`<div class="text-slate-900 font-sans text-xs"><b>User:</b> ${data.name}<br><b>Status:</b> ${data.isEmergency ? '🚨 SOS' : hasBreachedGeofence ? '⚠️ BREACHED' : '🟢 SAFE'}</div>`, { className: 'custom-popup' });

                    if (data.history) {
                        const trailPoints = Object.keys(data.history).map(key => [data.history[key].lat, data.history[key].lng]);
                        if (mapPolylines[userId]) {
                            mapPolylines[userId].setLatLngs(trailPoints);
                        } else {
                            mapPolylines[userId] = L.polyline(trailPoints, {
                                color: userId === currentUserId ? '#2563eb' : '#16a34a', weight: 4, opacity: 0.85
                            }).addTo(map);
                        }
                    }
                });

                document.getElementById('cnt-total').innerText = activeNodes;
                document.getElementById('cnt-breach').innerText = totalBreaches;
                document.getElementById('cnt-alert').innerText = totalAlerts;

                if(groupAlertTriggered) {
                    emergencyMsg.innerText = compositeAlertMsg;
                    emergencyBanner.classList.remove('hidden');
                    siren.play().catch(() => {});
                } else {
                    emergencyBanner.classList.add('hidden');
                    siren.pause();
                }
            });
        }

        document.getElementById('btn-ble-connect').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'GeoGuard_Button' }], optionalServices: [BLE_SERVICE_UUID] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(BLE_SERVICE_UUID);
                const characteristic = await service.getCharacteristic(BLE_CHARACTERISTIC_UUID);
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const value = event.target.value.getUint8(0);
                    set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), value === 1);
                });
            } catch (error) { console.error(error); }
        });

        document.getElementById('btn-panic').addEventListener('click', () => {
            set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), true);
        });
        document.getElementById('dismiss-emergency').addEventListener('click', () => {
            set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), false);
        });
    </script>
</body>
</html>
