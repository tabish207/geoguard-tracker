        let map = null;

        let lastValidLat = null;
        let lastValidLng = null;
        const MIN_MOVEMENT_THRESHOLD = 0.0001; 

        const BLE_SERVICE_UUID = "4fa4c201-1fb2-45fe-a28a-75dec6c0e453";
        const BLE_CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const setupPanel = document.getElementById('setup-panel');

        const usernameInput = document.getElementById('username');

        // 3. THIRD: Resilient Offline Queue Configuration (Now safely using currentUserId!)
        const STORAGE_KEY = `geoguard_offline_buffer_${currentUserId}`;

        function bufferLocationOffline(lat, lng) {

        // ... Keep the rest of your code exactly the same below this line ...
        // GPS Drift baseline memory
        let lastValidLat = null;
        let lastValidLng = null;
        const MIN_MOVEMENT_THRESHOLD = 0.0001; // Restricts erratic drift updates (~10-15m variation)

        const BLE_SERVICE_UUID = "4fa4c201-1fb2-45fe-a28a-75dec6c0e453";
        const BLE_CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const setupPanel = document.getElementById('setup-panel');
        const trackingPanel = document.getElementById('tracking-panel');
        const usernameInput = document.getElementById('username');
        const emergencyBanner = document.getElementById('emergency-banner');
        const emergencyMsg = document.getElementById('emergency-msg');
        const siren = document.getElementById('siren-audio');

        // Resilient Offline Queue Configuration
        const STORAGE_KEY = `geoguard_offline_buffer_${currentUserId}`;

        function bufferLocationOffline(lat, lng) {
            try {
                let buffer = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                buffer.push({ lat: lat, lng: lng, timestamp: Date.now() });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(buffer));
                console.warn(`[Offline] Saved snapshot locally. Queue size: ${buffer.length}`);
            } catch (e) {
                console.error("Local queue crash:", e);
            }
        }

        function flushOfflineBuffer() {
            if (!navigator.onLine || !currentGroupId) return;
            try {
                let buffer = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                if (buffer.length === 0) return;
                
                console.log(`[Online] Processing telemetry sync engine... Uploading ${buffer.length} logs.`);
                const historyRef = ref(db, `groups/${currentGroupId}/members/${currentUserId}/history`);
                
                buffer.forEach(point => { push(historyRef, point); });
                localStorage.removeItem(STORAGE_KEY);
            } catch (e) {
                console.error("Sync pipeline structural fault:", e);
            }
        }

        window.addEventListener('online', flushOfflineBuffer);

        if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js', { scope: './' })
                .then(reg => {
                    if(currentGroupId) syncSessionWithWorker();
                }).catch(err => console.error(err));
            });
        }

        if (currentGroupId && currentUsername) {
            if (setupPanel) setupPanel.classList.add('hidden');
            if (trackingPanel) trackingPanel.classList.remove('hidden');
            
            const unlockOverlay = document.createElement('div');
            unlockOverlay.id = 'audio-unlock-shutter';
            unlockOverlay.className = 'fixed inset-0 bg-slate-950/95 z-[99999] flex flex-col items-center justify-center p-6 text-center gap-4';
            unlockOverlay.innerHTML = `
                <h3 class="text-white font-bold text-lg tracking-wide uppercase">Telemetry Node Recovered</h3>
                <p class="text-slate-400 text-xs max-w-xs leading-relaxed">System requires an interface confirmation check to arm local audio warning engines.</p>
                <button id="btn-audio-activate" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase px-6 py-3 rounded-xl tracking-wider shadow-lg transition-all mt-2">
                    Arm Terminal Audio
                </button>
            `;
            document.body.appendChild(unlockOverlay);

            document.getElementById('btn-audio-activate').addEventListener('click', () => {
                if (siren) {
                    siren.play().then(() => {
                        siren.pause();
                        siren.currentTime = 0;
                        unlockOverlay.remove();
                        
                        requestScreenWakeLock();
                        initiateMappingSystem();
                        startLiveGeolocationTracking();
                        listenToGroupRealtimeChanges();
                    }).catch(() => {
                        unlockOverlay.remove();
                    });
                }
            });
        }

        async function requestScreenWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
        }

        function syncSessionWithWorker() {
            if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'SYNC_SESSION',
                    groupId: currentGroupId,
                    userId: currentUserId,
                    firebaseConfig: firebaseConfig
                });
            }
        }

        document.getElementById('btn-create-mode').addEventListener('click', () => {
            document.getElementById('create-group-box').classList.remove('hidden');
            document.getElementById('join-group-box').classList.add('hidden');
        });

        document.getElementById('btn-join-mode').addEventListener('click', () => {
            document.getElementById('join-group-box').classList.remove('hidden');
            document.getElementById('create-group-box').classList.add('hidden');
        });

        document.getElementById('btn-submit-create').addEventListener('click', () => {
            currentUsername = usernameInput.value.trim();
            const groupName = document.getElementById('group-name').value.trim();
            if(!currentUsername || !groupName) return alert("Verify core input requirements.");

            const groupsRef = ref(db, 'groups');
            const newGroupRef = push(groupsRef);
            currentGroupId = newGroupRef.key;

            set(newGroupRef, { groupName: groupName, createdAt: Date.now(), guideId: currentUserId }).then(() => {
                commitSessionToStorage(currentGroupId, currentUsername);
            });
        });

        document.getElementById('btn-submit-join').addEventListener('click', () => {
            currentUsername = usernameInput.value.trim();
            currentGroupId = document.getElementById('target-group-id').value.trim();
            if(!currentUsername || !currentGroupId) return alert("Verify core input requirements.");
            commitSessionToStorage(currentGroupId, currentUsername);
        });

        function commitSessionToStorage(groupId, name) {
            localStorage.setItem('geo_group_id', groupId);
            localStorage.setItem('geo_username', name);
            
            if (siren) {
                siren.play().then(() => {
                    siren.pause();
                    siren.currentTime = 0;
                }).catch(e => console.log("Audio priming bypassed:", e));
            }
            
            const memberRef = ref(db, `groups/${groupId}/members/${currentUserId}`);
            set(memberRef, { name: name, lat: 0.0, lng: 0.0, isEmergency: false }).then(() => {
                if (setupPanel) setupPanel.classList.add('hidden');
                if (trackingPanel) trackingPanel.classList.remove('hidden');
                requestScreenWakeLock(); 
                initiateMappingSystem();
                startLiveGeolocationTracking();
                listenToGroupRealtimeChanges();
                syncSessionWithWorker();
            });
        }

        function initiateMappingSystem() {
            try {
                if (map !== null) { map.remove(); map = null; }
                const mapEl = document.getElementById('map');
                if (!mapEl) return;

                map = L.map('map', { zoomControl: false, trackResize: true }).setView([30.3753, 69.3451], 5);
                L.control.zoom({ position: 'topright' }).addTo(map);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors',
                    maxZoom: 19,
                    crossOrigin: true
                }).addTo(map);

                const drawnItems = new L.FeatureGroup();
                map.addLayer(drawnItems);

                const drawControl = new L.Control.Draw({
                    position: 'topleft',
                    draw: {
                        polygon: { allowIntersection: false, showArea: true, shapeOptions: { color: '#2563eb', fillColor: '#3b82f6', fillOpacity: 0.2, weight: 3 } },
                        polyline: false, circle: false, rectangle: false, marker: false, circlemarker: false
                    },
                    edit: { featureGroup: drawnItems, remove: true }
                });
                map.addControl(drawControl);

                map.on(L.Draw.Event.CREATED, function (e) {
                    if (activeGeofencePolygon) { drawnItems.removeLayer(activeGeofencePolygon); }
                    activeGeofencePolygon = e.layer;
                    activeGeofencePolygon.setStyle({ color: '#ea580c', fillColor: '#f97316', fillOpacity: 0.15, weight: 3 });
                    drawnItems.addLayer(activeGeofencePolygon);
                });

                map.on(L.Draw.Event.DELETED, function () { activeGeofencePolygon = null; });
                map.invalidateSize();
            } catch (err) {
                console.error("Leaflet core allocation fault:", err);
            }
        }

        function isPointInPolygon(lat, lng, polygon) {
            if (!polygon || !polygon.getLatLngs) return true;
            try {
                const latlngs = polygon.getLatLngs()[0];
                let inside = false;
                for (let i = 0, j = latlngs.length - 1; i < latlngs.length; j = i++) {
                    const xi = latlngs[i].lat, yi = latlngs[i].lng;
                    const xj = latlngs[j].lat, yj = latlngs[j].lng;
                    const intersect = ((yi > lng) !== (yj > lng)) && (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi);
                    if (intersect) inside = !inside;
                }
                return inside;
            } catch(e) { return true; }
        }

        function startLiveGeolocationTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    // 🛑 DRIFT FILTER 1: Skip updates with low precision variances (>30m bounds)
                    if (accuracy > 30) {
                        console.warn(`[GPS Filtered] Reading dropped due to low precision bounds (${accuracy}m accuracy).`);
                        return;
                    }

                    // 🛑 DRIFT FILTER 2: Compare distance shift delta matrices
                    if (lastValidLat !== null && lastValidLng !== null) {
                        const latDelta = Math.abs(lat - lastValidLat);
                        const lngDelta = Math.abs(lng - lastValidLng);
                        if (latDelta < MIN_MOVEMENT_THRESHOLD && lngDelta < MIN_MOVEMENT_THRESHOLD) {
                            return; // Suppress coordinate jump anomalies while stationary
                        }
                    }

                    lastValidLat = lat;
                    lastValidLng = lng;
                    
                    if(currentGroupId) {
                        if (navigator.onLine) {
                            set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/lat`), lat);
                            set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/lng`), lng);
                            
                            const historyRef = ref(db, `groups/${currentGroupId}/members/${currentUserId}/history`);
                            push(historyRef, { lat: lat, lng: lng, timestamp: Date.now() });
                            
                            flushOfflineBuffer();
                        } else {
                            bufferLocationOffline(lat, lng);
                        }
                    }
                }, (error) => console.error(error), { 
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 10000
                });
            }
        }

        function listenToGroupRealtimeChanges() {
            if (!currentGroupId) return;

            onValue(ref(db, `groups/${currentGroupId}/groupName`), (snapshot) => {
                const nameNode = document.getElementById('display-group-name');
                if(nameNode) nameNode.innerText = snapshot.val() || "Active Session";
                document.getElementById('display-group-id').innerText = currentGroupId;
            });

            onValue(ref(db, `groups/${currentGroupId}/members`), (snapshot) => {
                const members = snapshot.val() || {};
                const rosterList = document.getElementById('member-list');
                if(!rosterList) return;
                rosterList.innerHTML = ""; 

                let groupAlertTriggered = false;
                let compositeAlertMsg = "";
                let activeNodes = 0;
                let totalBreaches = 0;
                let totalAlerts = 0;

                Object.keys(members).forEach(userId => {
                    const data = members[userId];
                    if(!data || (data.lat === 0 && data.lng === 0)) return;

                    activeNodes++;
                    const isInsideSafeZone = isPointInPolygon(data.lat, data.lng, activeGeofencePolygon);
                    const hasBreachedGeofence = !isInsideSafeZone;

                    if (hasBreachedGeofence) totalBreaches++;
                    if (data.isEmergency) totalAlerts++;

                    if (data.isEmergency || hasBreachedGeofence) {
                        groupAlertTriggered = true;
                        compositeAlertMsg = (data.name || 'Operator').toUpperCase() + (data.isEmergency ? " [SOS]" : " [BREACH]");
                    }

                    const li = document.createElement('li');
                    li.className = `p-3 rounded-xl border flex flex-col gap-1 text-xs ${
                        data.isEmergency ? 'bg-red-500 text-white border-red-600 font-bold' : hasBreachedGeofence ? 'bg-amber-500 text-slate-900 border-amber-600 font-semibold' : 'bg-slate-800 text-slate-100 border-slate-700'
                    }`;
                    
                    li.innerHTML = `
                        <div class="flex items-center justify-between">
                            <span>${data.name || 'Unknown'} ${userId === currentUserId ? '(You)' : ''}</span>
                            <span class="text-[9px] font-mono tracking-widest px-1.5 py-0.5 rounded uppercase bg-black/20">${
                                data.isEmergency ? 'SOS' : hasBreachedGeofence ? 'BREACH' : 'OK'
                            }</span>
                        </div>
                    `;
                    rosterList.appendChild(li);

                    const markerColor = data.isEmergency ? 'red' : hasBreachedGeofence ? 'orange' : 'blue';
                    const targetIcon = L.icon({
                        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${markerColor}.png`,
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                    });

                    if (map) {
                        if (mapMarkers[userId]) {
                            mapMarkers[userId].setLatLng([data.lat, data.lng]);
                            mapMarkers[userId].setIcon(targetIcon);
                        } else {
                            mapMarkers[userId] = L.marker([data.lat, data.lng], { icon: targetIcon }).addTo(map);
                        }
                        mapMarkers[userId].bindPopup(`<div class="text-slate-900 font-sans text-xs"><b>User:</b> ${data.name || 'Unknown'}<br><b>Status:</b> ${data.isEmergency ? '🚨 SOS' : hasBreachedGeofence ? '⚠️ BREACHED' : '🟢 SAFE'}</div>`, { className: 'custom-popup' });
                    }

                    if (data.history && map) {
                        const trailPoints = Object.keys(data.history).map(key => [data.history[key].lat, data.history[key].lng]);
                        if (mapPolylines[userId]) {
                            mapPolylines[userId].setLatLngs(trailPoints);
                        } else {
                            mapPolylines[userId] = L.polyline(trailPoints, {
                                color: userId === currentUserId ? '#2563eb' : '#16a34a', weight: 4, opacity: 0.85
                            }).addTo(map);
                        }
                    }
                });

                document.getElementById('cnt-total').innerText = activeNodes;
                document.getElementById('cnt-breach').innerText = totalBreaches;
                document.getElementById('cnt-alert').innerText = totalAlerts;

                if (groupAlertTriggered) {
                    if (emergencyMsg) emergencyMsg.innerText = compositeAlertMsg;
                    if (emergencyBanner) emergencyBanner.classList.remove('hidden');
                    
                    if (siren) {
                        siren.volume = 1.0; 
                        siren.addEventListener('ended', function() {
                            this.currentTime = 0;
                            this.play().catch(() => {});
                        }, false);
                        siren.play().catch((err) => console.log("Autoplay blocked block:", err));
                    }
                } else {
                    if (emergencyBanner) emergencyBanner.classList.add('hidden');
                    if (siren) {
                        siren.pause();
                        siren.currentTime = 0;
                    }
                }
            });
        }

        const handleLogoutAndClear = () => {
            localStorage.clear();
            window.location.reload();
        };
        document.getElementById('btn-logout').addEventListener('click', handleLogoutAndClear);
        document.getElementById('btn-hard-reset').addEventListener('click', handleLogoutAndClear);

        document.getElementById('btn-ble-connect').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'GeoGuard_Button' }], optionalServices: [BLE_SERVICE_UUID] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(BLE_SERVICE_UUID);
                const characteristic = await service.getCharacteristic(BLE_CHARACTERISTIC_UUID);
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const value = event.target.value.getUint8(0);
                    if(currentGroupId) set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), value === 1);
                });
            } catch (error) { console.error(error); }
        });

        document.getElementById('btn-panic').addEventListener('click', () => {
            if(currentGroupId) set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), true);
        });
        document.getElementById('dismiss-emergency').addEventListener('click', () => {
            if(currentGroupId) set(ref(db, `groups/${currentGroupId}/members/${currentUserId}/isEmergency`), false);
        });
    </script>
</body>
</html>
